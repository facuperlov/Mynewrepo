<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Music Survey</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
    }

    form {
        width: 650px;
    }

    label {
        display: block;
        margin-top: 10px;
    }

    fieldset {
        margin-top: 15px;
        padding: 10px;
    }

    legend {
        font-weight: bold;
    }

    textarea {
        width: 100%;
    }

    .footer {
        margin-top: 30px;
    }
</style>

</head>
<body>

<h1>Music Survey</h1>

<form>

    <!-- Name -->
    <label for="name">Name:</label>
    <input type="text" id="name" name="name">

    <!-- Email -->
    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email">

    <!-- Favorite Types (Checkboxes) -->
    <fieldset>
        <legend>Select Your Favorite Types of Music:</legend>

        <input type="checkbox" name="music" value="Pop"> Pop<br>
        <input type="checkbox" name="music" value="Classical"> Classical<br>
        <input type="checkbox" name="music" value="Rock"> Rock<br>
        <input type="checkbox" name="music" value="Folk"> Folk<br>
        <input type="checkbox" name="music" value="Rap"> Rap<br>
        <input type="checkbox" name="music" value="Other"> Other
    </fieldset>

    <!-- Radio Buttons -->
    <fieldset>
        <legend>Select how often you purchase music:</legend>

        <input type="radio" name="purchase" value="Weekly"> Weekly<br>
        <input type="radio" name="purchase" value="Yearly"> A few CDs each year<br>
        <input type="radio" name="purchase" value="Monthly"> Monthly<br>
        <input type="radio" name="purchase" value="Never"> Never purchase
    </fieldset>

    <!-- Select Box -->
    <label for="location">Select the locations you listen to Music:</label>
    <select id="location" name="location" size="3">
        <option>At home</option>
        <option>In the car</option>
        <option>Anywhere</option>
        <option>At work</option>
    </select>

    <!-- Date input (ADDED per assignment) -->
    <label for="date">When do you listen to music?</label>
    <input type="date" id="date" name="date">

    <!-- Textarea -->
    <label for="comments">What role does music play in your life?</label>
    <textarea id="comments" name="comments" rows="3" cols="60"></textarea>

    <!-- Buttons -->
    <br><br>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

<div class="footer">
    Facundo Perlov<br>
    fperlov@mail.lipscomb.edu
</div>

</body>
</html>
