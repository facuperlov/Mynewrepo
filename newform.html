<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>New Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        form {
            width: 600px;
        }

        label {
            display: inline-block;
            width: 140px;
            margin-bottom: 10px;
            vertical-align: top;
        }

        fieldset {
            width: 500px;
            margin-top: 15px;
            padding: 10px;
        }

        legend {
            font-weight: bold;
        }

        .radio-group label {
            display: inline;
            width: auto;
            margin-right: 10px;
        }

        .footer {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1>Registration Form</h1>

<form method="post" action="https://webdevbasics.net/scripts/demo.php">

    <label for="username">User Name:</label>
    <input type="text" name="username" id="username" maxlength="30"><br>

    <label for="pword">Password:</label>
    <input type="password" name="pword" id="pword"><br>

    <label>Favorite Day:</label>
    <span class="radio-group">
        <input type="radio" name="favday" value="Monday"> Monday
        <input type="radio" name="favday" value="Friday"> Friday
        <input type="radio" name="favday" value="Sunday"> Sunday
    </span><br>

    <label for="social">Favorite Social Network:</label>
    <select name="social" id="social">
        <option>Instagram</option>
        <option>TikTok</option>
        <option>X / Twitter</option>
        <option>Facebook</option>
    </select><br>

    <fieldset>
        <legend>Shipping Address</legend>

        <label for="address1">AddressLine1:</label>
        <input type="text" name="address1" id="address1"><br>

        <label for="address2">AddressLine2:</label>
        <input type="text" name="address2" id="address2"><br>

        <label for="city">City:</label>
        <input type="text" name="city" id="city"><br>

        <label for="state">State:</label>
        <input type="text" name="state" id="state"><br>

        <label for="zip">ZIP:</label>
        <input type="text" name="zip" id="zip"><br>
    </fieldset>

    <input type="hidden" name="userid" value="facuperlov">

    <input type="submit" value="Sign Up">

</form>

<div class="footer">
    Facundo Perlov<br>
    fperlov@mail.lipscomb.edu
</div>

</body>
</html>
